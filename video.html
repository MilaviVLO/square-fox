    :root {
      --bg: #07000f;
      --bg2: #0f0020;
      --accent: #b04dff;
      --accent2: #7a1fff;
      --accent3: #d480ff;
      --glow: rgba(160, 60, 255, 0.38);
      --text: #e8d5ff;
      --muted: #a882cc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Raleway', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── STARFIELD ─── */
    #starfield { position: fixed; inset: 0; z-index: -1; }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: rgba(7, 0, 16, 0.92);
      border-bottom: 1px solid rgba(176, 77, 255, 0.15);
      backdrop-filter: blur(16px);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      padding: 13px 16px;
      z-index: 1000;
      flex-wrap: wrap;
    }

    .logo-text {
      font-family: 'PixelMC', 'Press Start 2P', monospace;
      font-size: 1.1em;
      color: var(--accent);
      letter-spacing: 3px;
      margin-right: 18px;
      text-shadow: 0 0 18px var(--glow), 0 2px 0 #3a0070;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.78em;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 20px;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #fff;
      border-color: rgba(176, 77, 255, 0.4);
      background: rgba(176, 77, 255, 0.12);
    }

    .nav-links a.active { color: var(--accent3); }

    /* ─── BURGER ─── */
    .burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      margin-left: auto;
      z-index: 1001;
    }
    .burger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .burger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* ─── SOCIAL SIDEBAR ─── */
    .top-buttons {
      position: fixed;
      top: 80px; right: 13px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .top-button {
      background: rgba(10, 0, 20, 0.84);
      border: 1px solid rgba(176, 77, 255, 0.2);
      border-radius: 50%;
      width: 42px; height: 42px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }

    .top-button:hover {
      background: rgba(176, 77, 255, 0.28);
      border-color: var(--accent);
      transform: scale(1.12) translateX(-3px);
      box-shadow: 0 0 12px var(--glow);
    }

    .top-button svg { width: 19px; height: 19px; fill: #d0b0ee; }

    /* ─── VOLUME PANEL ─── */
    .volume-panel {
      position: fixed;
      top: 80px; right: 62px;
      z-index: 998;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateX(10px);
    }
    .volume-panel.visible { opacity: 1; pointer-events: all; transform: translateX(0); }

    .volume-panel-inner {
      background: rgba(10, 0, 22, 0.92);
      border: 1px solid rgba(176, 77, 255, 0.28);
      border-radius: 14px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .volume-label { font-size: 0.6em; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .volume-value { font-size: 0.72em; font-weight: 700; color: var(--accent3); letter-spacing: 1px; min-width: 30px; text-align: center; }

    input[type="range"].vol-slider {
      -webkit-appearance: none; appearance: none;
      writing-mode: vertical-lr; direction: rtl;
      width: 6px; height: 90px;
      background: transparent; cursor: pointer; outline: none;
    }
    input[type="range"].vol-slider::-webkit-slider-runnable-track { background: rgba(176,77,255,0.2); border-radius: 10px; width: 6px; }
    input[type="range"].vol-slider::-moz-range-track { background: rgba(176,77,255,0.2); border-radius: 10px; width: 6px; }
    input[type="range"].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      margin-left: -5px; box-shadow: 0 0 8px rgba(176,77,255,0.6);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    input[type="range"].vol-slider::-webkit-slider-thumb:hover { transform: scale(1.25); box-shadow: 0 0 14px rgba(176,77,255,0.9); }
    input[type="range"].vol-slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none; box-shadow: 0 0 8px rgba(176,77,255,0.6);
    }

    .vol-icon { opacity: 0.7; }

    @keyframes musicPulse { 0%,100%{box-shadow:0 0 6px var(--glow);} 50%{box-shadow:0 0 22px rgba(176,77,255,0.8);} }
    .music-pulse { animation: musicPulse 1.8s ease infinite; }

    /* ─── MAIN CONTENT ─── */
    main {
      padding-top: 90px;
      min-height: 100vh;
    }

    /* ─── PAGE HERO ─── */
    .page-hero {
      text-align: center;
      padding: 60px 20px 40px;
      position: relative;
    }

    .page-hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(176, 77, 255, 0.1);
      border: 1px solid rgba(176, 77, 255, 0.3);
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 0.72em;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent3);
      margin-bottom: 18px;
      animation: fadeDown 0.8s ease both;
    }

    .page-hero-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.8em, 5vw, 3.2em);
      color: #fff;
      text-shadow: 0 0 30px var(--accent), 0 0 80px rgba(176, 77, 255, 0.35), 0 4px 0 #2a0060;
      letter-spacing: 4px;
      margin-bottom: 14px;
      animation: fadeDown 0.9s 0.1s ease both;
    }

    .page-hero-sub {
      color: var(--muted);
      font-size: 0.88em;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
      animation: fadeDown 0.9s 0.2s ease both;
    }

    .page-hero-divider {
      width: 130px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 28px auto 0;
      animation: fadeDown 0.9s 0.3s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── FILTER SECTION ─── */
    .filter-section {
      max-width: 900px;
      margin: 40px auto 0;
      padding: 0 20px;
      animation: fadeDown 0.9s 0.4s ease both;
    }

    .filter-group {
      margin-bottom: 18px;
    }

    .filter-label {
      font-size: 0.68em;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-btn {
      background: rgba(176, 77, 255, 0.06);
      border: 1px solid rgba(176, 77, 255, 0.22);
      color: var(--muted);
      font-family: 'Raleway', sans-serif;
      font-size: 0.75em;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
    }

    .tag-btn:hover {
      border-color: rgba(176, 77, 255, 0.5);
      color: var(--text);
      background: rgba(176, 77, 255, 0.12);
    }

    .tag-btn.active {
      background: rgba(176, 77, 255, 0.22);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(176, 77, 255, 0.3);
    }

    .filter-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(176, 77, 255, 0.2), transparent);
      margin: 24px 0;
    }

    /* ─── RESULTS COUNT ─── */
    .results-info {
      max-width: 1300px;
      margin: 10px auto 0;
      padding: 0 20px;
      font-size: 0.72em;
      letter-spacing: 2px;
      color: rgba(168, 130, 204, 0.6);
      text-transform: uppercase;
      text-align: right;
    }

    /* ─── VIDEO GRID ─── */
    .video-grid {
      max-width: 1300px;
      margin: 28px auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* ─── VIDEO CARD ─── */
    .video-card {
      background: linear-gradient(145deg, rgba(15, 0, 32, 0.85), rgba(25, 5, 50, 0.75));
      border: 1px solid rgba(176, 77, 255, 0.15);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.35s ease;
      cursor: pointer;
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      animation: cardAppear 0.5s ease forwards;
    }

    @keyframes cardAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    .video-card:hover {
      border-color: rgba(176, 77, 255, 0.45);
      box-shadow: 0 8px 40px rgba(176, 77, 255, 0.18), 0 0 0 1px rgba(176, 77, 255, 0.08);
      transform: translateY(-4px);
    }

    .video-card.hidden {
      display: none;
    }

    /* ─── THUMBNAIL WRAPPER ─── */
    .thumb-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #0a0018;
      overflow: hidden;
    }

    .thumb-wrapper img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, filter 0.4s ease;
      filter: saturate(1.05);
    }

    .video-card:hover .thumb-wrapper img {
      transform: scale(1.04);
      filter: saturate(1.2);
    }

    /* ─── PLAY OVERLAY ─── */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(7, 0, 16, 0);
      transition: background 0.3s ease;
      z-index: 2;
    }

    .video-card:hover .play-overlay {
      background: rgba(7, 0, 16, 0.3);
    }

    .play-btn {
      width: 52px; height: 52px;
      background: rgba(176, 77, 255, 0.85);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.3s ease;
      box-shadow: 0 0 25px rgba(176, 77, 255, 0.6);
    }

    .play-btn svg {
      width: 20px; height: 20px;
      fill: #fff;
      margin-left: 3px;
    }

    .video-card:hover .play-btn {
      opacity: 1;
      transform: scale(1);
    }

    /* ─── IFRAME (hidden until click) ─── */
    .iframe-wrapper {
      position: absolute;
      inset: 0;
      z-index: 5;

// ─── STARFIELD ───
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 5000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.1 + 0.2,
        o: Math.random() * 0.6 + 0.15,
        speed: Math.random() * 0.018 + 0.004,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    stars.forEach(s => {
      const flicker = s.o * (0.7 + 0.3 * Math.sin(frame * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,190,255,${flicker})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); initStars(); draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
})();

// Season tag colors mapping

  SF1: '#d480ff', SF2: '#b04dff', SF4: '#8833ee',

};

function formatTagClass(f) {
  if (f === 'Лорное') return 'format-lore';
  if (f === 'Развлекательное') return 'format-ent';
  return 'format-other';
}

function buildCards() {
  const grid = document.getElementById('video-grid');
  const empty = document.getElementById('empty-state');
  // Remove existing cards
  grid.querySelectorAll('.video-card').forEach(c => c.remove());

  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.dataset.seasons = v.seasons.join(',');
    card.dataset.formats = v.formats.join(',');
    card.style.animationDelay = (i * 40) + 'ms';

    const allSeasonTags = v.seasons.map(s =>
      `<span class="card-tag season" style="border-color:${seasonColors[s]}44;color:${seasonColors[s]}">${s}</span>`
    ).join('');
    const allFormatTags = v.formats.map(f =>
      `<span class="card-tag ${formatTagClass(f)}">${f}</span>`
    ).join('');

    card.innerHTML = `
      <div class="thumb-wrapper">
        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"
             alt="Видео ${v.id}"
             loading="lazy"
             onerror="this.src='https://img.youtube.com/vi/${v.id}/0.jpg'">
        <div class="play-overlay">
          <div class="play-btn">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>

      <div class="card-info">
        <div class="card-tags">
          ${allSeasonTags}
          ${allFormatTags}
        </div>
      </div>
    `;

    // Click to play
    card.querySelector('.play-overlay').addEventListener('click', (e) => {
      e.stopPropagation();
      openVideo(v.id);
    });

    grid.insertBefore(card, empty);
  });
}

function openVideo(id) {
  // Close any open
  document.querySelectorAll('.iframe-wrapper').forEach(iw => {
    if (iw.style.display === 'flex') {
      iw.style.display = 'none';
      iw.querySelector('iframe').src = '';
    }
  });
  const iw = document.getElementById('iw-' + id);
  iw.style.display = 'flex';
  iw.querySelector('iframe').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
}

function closeVideo(id, e) {
  e.stopPropagation();
  const iw = document.getElementById('iw-' + id);
  iw.style.display = 'none';
  iw.querySelector('iframe').src = '';
}

// ─── FILTER LOGIC (multi-select) ───
// Sets of active values; empty set = "Все" (show all)
let activeSeasons = new Set();
let activeFormats = new Set();

function applyFilters() {
  const cards = document.querySelectorAll('.video-card');
  let visible = 0;
  cards.forEach(card => {
    const seasons = card.dataset.seasons ? card.dataset.seasons.split(',') : [];
    const formats = card.dataset.formats ? card.dataset.formats.split(',') : [];
    const seasonOk = activeSeasons.size === 0 || seasons.some(s => activeSeasons.has(s));
    const formatOk = activeFormats.size === 0 || formats.some(f => activeFormats.has(f));
    if (seasonOk && formatOk) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });

  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('results-info').textContent = `${visible} видео`;

  // Sync "Все" button states
  ['season','format'].forEach(group => {
    const activeSet = group === 'season' ? activeSeasons : activeFormats;
    const allBtn = document.querySelector(`.tag-btn[data-group="${group}"][data-value="all"]`);
    if (allBtn) allBtn.classList.toggle('active', activeSet.size === 0);
  });
}

document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;
    const value = btn.dataset.value;
    const activeSet = group === 'season' ? activeSeasons : activeFormats;

    if (value === 'all') {
      // Clear all selections in this group
      activeSet.clear();
      document.querySelectorAll(`.tag-btn[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      // Remove "Все" highlight
      document.querySelector(`.tag-btn[data-group="${group}"][data-value="all"]`).classList.remove('active');

      if (activeSet.has(value)) {
        activeSet.delete(value);
        btn.classList.remove('active');
        // If nothing selected, revert to "Все"
        if (activeSet.size === 0) {
          document.querySelector(`.tag-btn[data-group="${group}"][data-value="all"]`).classList.add('active');
        }
      } else {
        activeSet.add(value);
        btn.classList.add('active');
      }
    }

    applyFilters();
  });
});

const ICON_ON  = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
const ICON_OFF = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';

function setMusicUI(playing) {
  icon.innerHTML = playing ? ICON_ON : ICON_OFF;

}

music.volume = 0.55;
music.play().then(() => {
  setMusicUI(true);
}).catch(() => {
  setMusicUI(false);
  const tryAutoplay = () => {
    music.play().then(() => {
      setMusicUI(true);
      document.removeEventListener('mousemove',  tryAutoplay);
      document.removeEventListener('scroll',     tryAutoplay);
      document.removeEventListener('click',      tryAutoplay);
      document.removeEventListener('keydown',    tryAutoplay);
      document.removeEventListener('touchstart', tryAutoplay);
    }).catch(() => {});
  };
  document.addEventListener('mousemove',  tryAutoplay);
  document.addEventListener('scroll',     tryAutoplay);
  document.addEventListener('click',      tryAutoplay);
  document.addEventListener('keydown',    tryAutoplay);
  document.addEventListener('touchstart', tryAutoplay);
});

musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (music.paused) {
    music.play().then(() => setMusicUI(true)).catch(() => {});
  } else {
    music.pause();
    setMusicUI(false);
  }
});

const volPanel    = document.getElementById('volume-panel');
const volSlider   = document.getElementById('vol-slider');
const volValue    = document.getElementById('vol-value');
const volIconHigh = document.getElementById('vol-icon-high');

let volHideTimer = null;
function showVolPanel() { clearTimeout(volHideTimer); volPanel.classList.add('visible'); }
function hideVolPanel() { volHideTimer = setTimeout(() => volPanel.classList.remove('visible'), 300); }

musicBtn.addEventListener('mouseenter', showVolPanel);
musicBtn.addEventListener('mouseleave', hideVolPanel);
volPanel.addEventListener('mouseenter', showVolPanel);
volPanel.addEventListener('mouseleave', hideVolPanel);

volSlider.addEventListener('input', () => {
  const val = parseInt(volSlider.value);
  music.volume = val / 100;
  volValue.textContent = val + '%';
  volIconHigh.innerHTML = val > 0 ? ICON_ON : ICON_OFF;
  volIconHigh.style.opacity = val > 0 ? '0.85' : '0.45';
});
</script>
</body>
</html>
