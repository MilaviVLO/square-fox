<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" href="icon.png" type="image/png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мерч — SquareFox</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07000f;
      --accent: #b04dff;
      --accent2: #7a1fff;
      --bright: #d480ff;
      --glow: rgba(160,60,255,0.38);
      --text: #e8d5ff;
      --muted: #9370bb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      font-family: 'Raleway', sans-serif;
      color: var(--text);
      cursor: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Убираем синюю обводку при тапе на мобильных */
    * {
      -webkit-tap-highlight-color: transparent;
    }
    img {
      outline: none;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-user-select: none;
    }
    img:focus { outline: none; }
    button, a, [role="button"] {
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    button:focus-visible, a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    #cur {
      position: fixed; z-index: 99999;
      width: 10px; height: 10px;
      background: var(--bright); border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 8px var(--accent);
    }

    #bg { position: fixed; inset: 0; z-index: 0; }

    #scanlines {
      position: fixed; inset: 0; z-index: 8; pointer-events: none;
    }
    @media (min-width: 601px) {
      #scanlines {
        background: repeating-linear-gradient(to bottom,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 6px);
      }
    }

    #vignette {
      position: fixed; inset: 0; z-index: 9; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(3,0,10,0.5) 75%, rgba(3,0,10,0.9) 100%);
    }

    header {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      background: rgba(7,0,15,0.85); border-bottom: 1px solid rgba(176,77,255,0.12);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      gap: 4px; padding: 13px 16px;
    }
    .logo-text {
      font-family: 'Press Start 2P', monospace; font-size: .88em;
      color: var(--accent); letter-spacing: 3px; margin-right: 18px;
      text-shadow: 0 0 14px var(--glow); text-decoration: none;
    }
    header a {
      color: var(--muted); text-decoration: none; font-weight: 600;
      font-size: .78em; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 6px 12px; border-radius: 20px; transition: all .3s; border: 1px solid transparent;
    }
    header a:hover { color: #fff; border-color: rgba(176,77,255,.4); background: rgba(176,77,255,.12); }
    header a.sp  { background: rgba(176,77,255,.12); border-color: rgba(176,77,255,.3); color: var(--bright); }
    header a.here{ background: rgba(212,128,255,.15); border-color: rgba(212,128,255,.4); color: #e8a0ff; }

    .burger { display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none; padding:4px; margin-left:auto; z-index:1001; }
    .burger span { display:block; width:24px; height:2px; background:var(--accent); border-radius:2px; transition:all .3s; }
    .burger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
    .burger.open span:nth-child(2){opacity:0;}
    .burger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
    .nav-links { display:flex; flex-wrap:wrap; align-items:center; gap:4px; }
    @media(max-width:768px){
      header{justify-content:space-between;flex-wrap:nowrap;gap:0;padding:10px 16px;}
      .burger{display:flex;}
      .nav-links{display:none;position:fixed;top:56px;left:0;right:0;background:rgba(7,0,15,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(176,77,255,.2);flex-direction:column;align-items:stretch;gap:0;padding:10px 16px 16px;z-index:999;}
      .nav-links.open{display:flex;}
      .nav-links a{padding:12px 16px;border-radius:12px;}
    }

    .top-buttons{position:fixed;top:80px;right:13px;z-index:999;display:flex;flex-direction:column;gap:7px;}
    .top-button{background:rgba(10,0,20,.84);border:1px solid rgba(176,77,255,.2);border-radius:50%;width:42px;height:42px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s;display:flex;justify-content:center;align-items:center;}
    .top-button:hover{background:rgba(176,77,255,.28);border-color:var(--accent);transform:scale(1.12) translateX(-3px);box-shadow:0 0 10px var(--glow);}
    .top-button svg{width:19px;height:19px;fill:#d0b0ee;}
    @keyframes musicPulse{0%,100%{box-shadow:0 0 5px var(--glow);}50%{box-shadow:0 0 18px rgba(176,77,255,.7);}}
    .music-pulse{animation:musicPulse 2s ease infinite;}
    .volume-panel{position:fixed;top:80px;right:62px;z-index:998;display:flex;align-items:center;pointer-events:none;opacity:0;transform:translateX(10px);transition:opacity .25s,transform .25s;}
    .volume-panel.visible{pointer-events:all;opacity:1;transform:translateX(0);}
    .volume-panel-inner{background:rgba(10,0,20,.92);border:1px solid rgba(176,77,255,.22);border-radius:20px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;backdrop-filter:blur(10px);}
    .volume-label{font-size:.6em;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
    .volume-value{font-size:.65em;color:var(--bright);letter-spacing:1px;}
    input[type=range].vol-slider{-webkit-appearance:none;appearance:none;writing-mode:vertical-lr;direction:rtl;width:6px;height:90px;background:transparent;cursor:pointer;outline:none;}
    input[type=range].vol-slider::-webkit-slider-runnable-track{background:rgba(176,77,255,.2);border-radius:10px;width:6px;}
    input[type=range].vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));margin-left:-5px;box-shadow:0 0 6px rgba(176,77,255,.5);}
    input[type=range].vol-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;}

    /* ── GLITCH — 3 слоя вместо 5 ── */
    #glitch-wrap {
      position: fixed; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; overflow: hidden;
    }
    .g-layer {
      position: absolute;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(4.5em, 17vw, 15em);
      font-weight: 900;
      white-space: nowrap;
      letter-spacing: -2px;
      line-height: 1;
      user-select: none;
    }
    #g-base {
      color: rgba(176,77,255,0.09);
      text-shadow: 0 0 80px rgba(176,77,255,0.15), 0 0 160px rgba(140,30,255,0.08);
      animation: basePulse 5s ease-in-out infinite;
    }
    @keyframes basePulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.65; }
    }
    #g-red  { color:rgba(255,40,200,0); animation:sliceR 7s steps(1) infinite; }
    #g-blue { color:rgba(40,220,255,0); animation:sliceB 7s steps(1) infinite 0.08s; }

    @keyframes sliceR {
      0%,82%,100% { color:rgba(255,40,200,0); transform:translate(0,0); clip-path:none; }
      83%  { color:rgba(255,40,200,.20); transform:translate(-8px,0);  clip-path:inset(5% 0 70% 0); }
      84%  { color:rgba(255,40,200,.15); transform:translate(6px,0);   clip-path:inset(60% 0 10% 0); }
      85%  { color:rgba(255,40,200,.22); transform:translate(-4px,0);  clip-path:inset(25% 0 50% 0); }
      86%  { color:rgba(255,40,200,0);   transform:translate(0,0);     clip-path:none; }
      93%  { color:rgba(255,40,200,.25); transform:translate(-10px,0); clip-path:inset(10% 0 60% 0); }
      94%  { color:rgba(255,40,200,.18); transform:translate(7px,0);   clip-path:inset(55% 0 15% 0); }
      95%  { color:rgba(255,40,200,0);   transform:translate(0,0);     clip-path:none; }
    }
    @keyframes sliceB {
      0%,82%,100% { color:rgba(40,220,255,0); transform:translate(0,0); clip-path:none; }
      83%  { color:rgba(40,220,255,.18); transform:translate(8px,0);   clip-path:inset(60% 0 5% 0);  }
      84%  { color:rgba(40,220,255,.14); transform:translate(-7px,0);  clip-path:inset(10% 0 65% 0); }
      85%  { color:rgba(40,220,255,.20); transform:translate(5px,0);   clip-path:inset(40% 0 30% 0); }
      86%  { color:rgba(40,220,255,0);   transform:translate(0,0);     clip-path:none; }
      93%  { color:rgba(40,220,255,.22); transform:translate(11px,0);  clip-path:inset(45% 0 25% 0); }
      94%  { color:rgba(40,220,255,.16); transform:translate(-8px,0);  clip-path:inset(5% 0 70% 0);  }
      95%  { color:rgba(40,220,255,0);   transform:translate(0,0);     clip-path:none; }
    }

    /* ── SCENE ── */
    #scene {
      position: fixed; inset: 0; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 8vh;
      pointer-events: none;
      overflow: visible;
    }
    #milavi-wrap {
      position: relative;
      pointer-events: all;
      cursor: pointer;
      animation: levitate 3.2s ease-in-out infinite;
      will-change: transform;
      overflow: visible;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    @keyframes levitate {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    @keyframes jumpBounce {
      0%   { transform: translateY(0px); }
      18%  { transform: translateY(-52px) rotate(-2.5deg); }
      40%  { transform: translateY(-38px) rotate(1.5deg); }
      58%  { transform: translateY(-46px) rotate(-1deg); }
      78%  { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    #milavi-wrap.jumping { animation: jumpBounce 0.6s ease-out forwards; }

    #milavi-shadow {
      position: absolute;
      bottom: -16px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 16px;
      background: radial-gradient(ellipse, rgba(176,77,255,0.28) 0%, transparent 70%);
      border-radius: 50%;
      animation: shadowPulse 3.2s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shadowPulse {
      0%,100% { transform: translateX(-50%) scaleX(1);    opacity: .28; }
      50%      { transform: translateX(-50%) scaleX(0.65); opacity: .1;  }
    }

    #milavi-wrap img {
      display: block;
      position: relative;
      z-index: 2;
      width:  clamp(260px, 55vmin, 800px);
      height: clamp(260px, 55vmin, 800px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter:
        drop-shadow(0 0 20px rgba(176,77,255,0.68))
        drop-shadow(0 0 50px rgba(140,30,255,0.3));
      transition: filter 0.2s ease;
      outline: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    #milavi-wrap:hover img {
      filter:
        drop-shadow(0 0 28px rgba(212,128,255,0.88))
        drop-shadow(0 0 72px rgba(176,77,255,0.45));
    }
    #milavi-wrap img#m2 {
      position: absolute; top: 0; left: 0;
      opacity: 0; transition: opacity 0.15s ease;
    }
    #milavi-wrap:hover img#m1 { opacity: 0; }
    #milavi-wrap:hover img#m2 { opacity: 1; }

    /* ── BUBBLE ── */
    #bubble {
      position: fixed; z-index: 20;
      background: rgba(7,0,15,0.93);
      border: 1.5px solid rgba(176,77,255,0.6);
      border-radius: 14px;
      padding: 14px 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.55em, 1.3vw, 0.78em);
      color: var(--bright);
      letter-spacing: 1px; line-height: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      box-shadow: 0 0 16px rgba(176,77,255,0.18);
      max-width: 360px;
      white-space: pre-wrap;
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -10px; left: 28px;
      border: 5px solid transparent;
      border-top-color: rgba(176,77,255,0.6);
    }
    #bubble.show { opacity: 1; }

    /* ── CLICK COUNTER ── */
    #click-counter {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      opacity: 0; animation: fadeUp 1s 2.2s ease forwards;
      background: rgba(100, 20, 180, 0.45);
      border: 1px solid rgba(176,77,255,0.35);
      border-radius: 12px;
      padding: 10px 20px 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 14px rgba(160,60,255,0.18);
    }
    .click-label {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.44em, 1vw, 0.58em);
      color: rgba(212,128,255,0.75);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .click-count {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.65em, 1.5vw, 0.9em);
      color: var(--bright);
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(176,77,255,0.5);
      transition: transform 0.12s ease, color 0.12s ease;
    }
    .click-count.bump { transform: scale(1.45); color: #fff; }

    /* ── ACHIEVEMENT ── */
    #achievement {
      position: fixed; top: 80px; left: 50%;
      transform: translateX(-50%) translateY(-16px);
      z-index: 10000;
      background: rgba(7,0,15,0.95);
      border: 1.5px solid rgba(212,128,255,0.7);
      border-radius: 12px;
      padding: 12px 26px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.44em, 1vw, 0.58em);
      color: #fff;
      letter-spacing: 1.5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 22px rgba(176,77,255,0.32);
      white-space: nowrap;
    }
    #achievement.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── BOTTOM ── */
    #info-block {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; animation: fadeUp 1s 1.8s ease forwards;
    }
    .info-label {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.44em, 1.1vw, 0.6em);
      color: var(--bright);
      letter-spacing: 3px; text-transform: uppercase;
      background: rgba(100, 20, 180, 0.55);
      border: 1px solid rgba(176,77,255,0.45);
      border-radius: 10px;
      padding: 8px 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 16px rgba(160,60,255,0.22);
    }
    .info-line { width: 50px; height: 1px; background: linear-gradient(90deg,transparent,rgba(176,77,255,.38),transparent); }

    /* ── ISLANDS ── */

    /* Остров3 — независимый fixed, позиция через JS */
    #island3 {
      position: fixed;
      z-index: 4;
      width: clamp(320px, 70vmin, 840px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      pointer-events: none;
      filter: drop-shadow(0 8px 24px rgba(120,40,220,0.45));
    }

    /* Остров4 — слева на фоне */
    #island4 {
      position: fixed;
      left: clamp(20px, 6vw, 120px);
      top: 50%;
      width: clamp(180px, 26vw, 420px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      pointer-events: none;
      z-index: 3;
      opacity: 0.72;
      filter: drop-shadow(0 6px 20px rgba(100,20,200,0.35)) blur(0.8px);
      animation: floatLeft 9s ease-in-out infinite;
    }
    @keyframes floatLeft {
      0%   { transform: translateY(calc(-50% + 0px))  translateX(0px); }
      30%  { transform: translateY(calc(-50% - 22px)) translateX(8px); }
      60%  { transform: translateY(calc(-50% - 10px)) translateX(-6px); }
      100% { transform: translateY(calc(-50% + 0px))  translateX(0px); }
    }

    /* Разлома — справа на фоне */
    #razlom-wrap {
      position: fixed;
      right: clamp(20px, 6vw, 120px);
      top: 42%;
      width: clamp(140px, 20vw, 340px);
      pointer-events: none;
      z-index: 3;
      animation: floatRight 7.5s ease-in-out infinite;
    }
    #razlom {
      display: block;
      width: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      opacity: 0.82;
      filter: drop-shadow(0 6px 18px rgba(140,30,220,0.35)) blur(0.8px);
      transform-origin: center center;
      animation: razlomPulse 4s ease-in-out infinite 1s;
    }
    @keyframes floatRight {
      0%   { transform: translateY(0px)   translateX(0px); }
      35%  { transform: translateY(-18px) translateX(-7px); }
      65%  { transform: translateY(-8px)  translateX(5px); }
      100% { transform: translateY(0px)   translateX(0px); }
    }
    @keyframes razlomPulse {
      0%,100% { transform: scale(1);    opacity: 0.82; }
      50%     { transform: scale(1.14); opacity: 1;    }
    }

    /* ── Широкие экраны (1400px+) ── */
    @media (min-width: 1400px) {
      #island4    { left: 5vw; width: clamp(280px, 22vw, 480px); top: 48%; }
      #razlom-wrap{ right: 5vw; width: clamp(220px, 18vw, 380px); top: 40%; }
      #island3    { width: clamp(380px, 72vmin, 920px); }
    }

    /* ── Небольшой десктоп / ноутбук (768–1024px) ── */
    @media (max-width: 1024px) and (min-width: 769px) {
      #island4    { left: 2vw; width: clamp(150px, 22vw, 300px); top: 52%; opacity: 0.65; }
      #razlom-wrap{ right: 2vw; width: clamp(120px, 18vw, 260px); top: 44%; }
      #island3    { width: clamp(280px, 62vmin, 700px); }
    }

    /* ── Планшет альбомный (600–768px) ── */
    @media (max-width: 768px) and (min-width: 601px) {
      #island4    { left: 1vw; width: clamp(130px, 20vw, 240px); top: 55%; opacity: 0.6; }
      #razlom-wrap{ right: 1vw; width: clamp(110px, 17vw, 210px); top: 46%; }
      #island3    { width: clamp(240px, 58vmin, 560px); }
    }

    /* ── Мобильный (до 600px) ── */
    @media (max-width: 600px) {
      #island4    { left: -30px; width: 28vw; top: 58%; opacity: 0.45; }
      #razlom-wrap{ right: -20px; width: 24vw; top: 48%; }
      #razlom     { opacity: 0.5; }
      #island3    { width: clamp(200px, 60vmin, 340px); }
    }

    /* ── Очень маленький (до 380px) ── */
    @media (max-width: 380px) {
      #island4    { display: none; }
      #razlom-wrap{ display: none; }
      #island3    { width: clamp(170px, 55vmin, 260px); }
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      body { cursor: auto; }
      #cur { display: none; }
      #milavi-wrap img {
        width:  clamp(220px, 78vw, 400px);
        height: clamp(220px, 78vw, 400px);
      }
      #milavi-shadow { width: clamp(120px, 52vw, 260px); }
      .g-layer { font-size: clamp(3em, 22vw, 8em); letter-spacing: -1px; }
      #bubble { font-size: clamp(0.42em, 3.2vw, 0.62em); max-width: 82vw; padding: 10px 16px; }
      .click-label { font-size: clamp(0.36em, 2.4vw, 0.5em); }
      .click-count  { font-size: clamp(0.55em, 3.8vw, 0.75em); }
      #achievement  { font-size: clamp(0.34em, 2.6vw, 0.5em); padding: 10px 18px; max-width: 88vw; white-space: normal; text-align: center; }
      .top-buttons  { top: 68px; right: 10px; }
      .volume-panel { top: 68px; right: 58px; }
      #info-block   { bottom: 18px; }
      .info-label   { font-size: clamp(0.34em, 2.4vw, 0.5em); letter-spacing: 2px; }
      #click-counter{ bottom: 72px; }
    }

    @keyframes fadeUp  { from{opacity:0;transform:translateX(-50%) translateY(12px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
    @keyframes sparkOut{ to { transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; } }

    /* ─── MC ACHIEVEMENT ─── */
    .mc-achievement {
      position: fixed;
      top: 20px; right: -440px;
      z-index: 99999;
      pointer-events: none;
      transition: right 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    .mc-achievement.show { right: 20px; }
    .mc-achievement img { display: block; image-rendering: pixelated; max-width: calc(100vw - 24px); height: auto; }
    @media (max-width: 440px) {
      .mc-achievement { right: -340px; }
      .mc-achievement.show { right: 10px; }
      .mc-achievement img { width: 75vw !important; }
    }
  </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="#d0b0ee" style="opacity:0.35">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>

      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>

<script>
// ── CURSOR ──
const cur = document.getElementById('cur');
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// ── STARS BG ──
(function(){
  const c = document.getElementById('bg'), ctx = c.getContext('2d');
  const isMobile = window.innerWidth <= 600;
  let W, H, stars = [], nebulas = [];
  function init(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    stars = Array.from({length: isMobile ? 90 : 150}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.2+0.2,
      a: Math.random(), tw: Math.random()*Math.PI*2,
      sp: Math.random()*.16+.04
    }));
    nebulas = isMobile ? [] : Array.from({length:3}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: 130+Math.random()*170,
      hue: 260+Math.random()*45,
      a: 0.022+Math.random()*0.028
    }));
  }
  let frame = 0;
  // Кэш небул в offscreen canvas — рисуем раз, потом копируем
  let nebulaCache = null;
  function buildNebulaCache(){
    if(!nebulas.length){ nebulaCache = null; return; }
    nebulaCache = document.createElement('canvas');
    nebulaCache.width = W; nebulaCache.height = H;
    const nc = nebulaCache.getContext('2d');
    nebulas.forEach(n => {
      const g = nc.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,`hsla(${n.hue},70%,25%,${n.a})`);
      g.addColorStop(1,'transparent');
      nc.fillStyle = g;
      nc.beginPath(); nc.arc(n.x,n.y,n.r,0,Math.PI*2); nc.fill();
    });
  }
  function draw(){
    frame++;
    ctx.clearRect(0,0,W,H);
    if(nebulaCache) ctx.drawImage(nebulaCache,0,0);
    stars.forEach(s => {
      s.tw += s.sp*.013;
      const al = .15+.55*(.5+.5*Math.sin(s.tw));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(200,160,255,${(al*s.a).toFixed(3)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  function fullInit(){
    init(); buildNebulaCache(); 
  }
  fullInit(); draw();
  window.addEventListener('resize', fullInit);
})();

// ── PARALLAX — только десктоп ──
(function(){
  if(window.matchMedia('(max-width:600px)').matches) return;
  const wrap = document.getElementById('milavi-wrap');
  let tx = 0, ty = 0, cx = window.innerWidth/2, cy = window.innerHeight/2;
  function tick(){
    tx += ((mouseX-cx)/cx*10 - tx)*0.04;
    ty += ((mouseY-cy)/cy*7  - ty)*0.04;
    wrap.style.marginLeft = tx.toFixed(2)+'px';
    wrap.style.marginTop  = ty.toFixed(2)+'px';
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize',()=>{cx=window.innerWidth/2;cy=window.innerHeight/2;});
  tick();
})();

// ── CURSOR TRAIL — только десктоп, облегчён ──
(function(){
  if(window.matchMedia('(max-width:600px)').matches) return;
  let last = 0;
  const cols = ['#d480ff','#b04dff','#9933ff','#cc99ff'];
  document.addEventListener('mousemove', e => {
    const now = Date.now();
    if(now-last < 120) return; last = now;
    if(Math.random()>.42) return;
    const sp = document.createElement('div');
    const sz = 2+Math.random()*2.5;
    sp.style.cssText=`position:fixed;width:${sz}px;height:${sz}px;border-radius:50%;`
      +`background:${cols[Math.floor(Math.random()*cols.length)]};`
      +`left:${e.clientX}px;top:${e.clientY}px;pointer-events:none;z-index:9990;opacity:.75;`
      +`--tx:${(Math.random()-.5)*16}px;--ty:${-6-Math.random()*13}px;`
      +`animation:sparkOut ${.32+Math.random()*.32}s ease-out forwards;`;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),650);
  });
})();

// ── ОСТРОВ3 — позиция под Милави ──
(function(){
  const island3 = document.getElementById('island3');
  const wrap    = document.getElementById('milavi-wrap');

  function place() {
    const r  = wrap.getBoundingClientRect();
    const iw = island3.naturalWidth
               ? island3.offsetWidth || island3.getBoundingClientRect().width
               : 0;
    if (!iw) return;

    const cx = r.left + r.width / 2;

    const milaviH = r.height;
    const screenH = window.innerHeight;
    const fill = milaviH / screenH;
    const isMobile = window.innerWidth <= 600;

    // На мобильных остров должен быть ниже (ближе к ногам Милави)
    // coeff = доля от высоты персонажа, на которую смещаем остров вниз от r.top
    const coeff = isMobile
      ? 0.52 + (1 - fill) * 0.12   // мобильный: остров держится у ног
      : 0.15 + (1 - fill) * 0.28;  // десктоп: оригинальное поведение

    const ty = r.top + milaviH * coeff;
    island3.style.left = (cx - iw / 2) + 'px';
    island3.style.top  = ty + 'px';
  }

  island3.addEventListener('load', place);
  if (island3.complete) place();
  window.addEventListener('resize', place);
  (function tick(){ place(); requestAnimationFrame(tick); })();
})();

// ── CLICK SOUNDS ──
const clickSounds = ['М3.mp3','М4.mp3','М5.mp3','М6.mp3'].map(src => {
  const a = new Audio(src); a.volume = 0.8; return a;
});


const _achAudio = new Audio('Достижение.mp3');
_achAudio.volume = 0.8;
let _achTimer = null;
function showMcAchievement(src, w, h) {
  const el = document.getElementById('mc-achievement');
  const img = document.getElementById('mc-achievement-img');
  img.src = src; img.style.width = w+'px'; img.style.height = h+'px';
  clearTimeout(_achTimer);
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  _achAudio.currentTime = 0; _achAudio.play().catch(()=>{});
  _achTimer = setTimeout(() => el.classList.remove('show'), 4500);
}

// ── COUNTER + ACHIEVEMENTS ──
let clickCount = 0;
const ccNum = document.getElementById('cc-num');
const achievementEl = document.getElementById('achievement');
let achieveTimer = null;
const achievements = {
  1:'Первый тык:D', 5:'5 тыков - молодца!',
  10:'10 тыков!', 25:'25 тыков - Мяу',
  50:'50 тыков - Ого...!', 100:'100 тыков. Зачем?!'
};
function showAchievement(text){
  clearTimeout(achieveTimer);
  achievementEl.textContent = text;
  achievementEl.classList.add('show');
  achieveTimer = setTimeout(()=>achievementEl.classList.remove('show'), 2800);
}
function bumpCounter(){
  clickCount++;
  ccNum.textContent = clickCount;
  ccNum.classList.remove('bump');
  void ccNum.offsetWidth;
  ccNum.classList.add('bump');
  setTimeout(()=>ccNum.classList.remove('bump'), 180);
  if(achievements[clickCount]) showAchievement(achievements[clickCount]);
  if(clickCount===1000) showMcAchievement('Достижение4.png',402,64);
}

// ── MILAVI + BUBBLE ──
// Пузырь — ТОЛЬКО при клике и ховере, никаких авто-таймеров
(function(){
  const wrap   = document.getElementById('milavi-wrap');
  const bubble = document.getElementById('bubble');
  let bubbleHideTimer = null;
  let hoverActive = false;

  const phrases = [
    'Что ты здесь ищешь?','Мерч скоро...','Жди анонса!','Я тут главная.',
    'Следи за соцсетями','...ну и что?','Уходи!','Скоро...',
    'Не трогай меня...','Хочу мерч!','Ладно, может скоро','Ауч!',
    'Опять ты...','Хватит тыкать!','Ты сломаешь меня...','Мяв!','Может хватит уже?'
  ];
  const rageMode = ['ХВАТИТ!!!','( >_< )','Я устала...','Почему?!'];
  let pIdx = 0;

  function positionBubble(){
    const rect = wrap.getBoundingClientRect();
    const bw = bubble.offsetWidth || 220;
    let left = rect.left + rect.width/2 - bw/2;
    left = Math.max(10, Math.min(window.innerWidth - bw - 10, left));
    bubble.style.left = left+'px';
    bubble.style.top  = (rect.top - bubble.offsetHeight - 16)+'px';
  }

  function showBubble(text){
    clearTimeout(bubbleHideTimer);
    bubble.textContent = text;
    bubble.classList.add('show');
    requestAnimationFrame(positionBubble);
    // Авто-скрытие — но не если ховер активен
    bubbleHideTimer = setTimeout(()=>{
      if(!hoverActive) bubble.classList.remove('show');
    }, 2800);
  }

  // Клик всегда перебивает текущий пузырь
  function handleClick(){
    // Звук при тыке — перематываем на начало если уже играет
    const snd = clickSounds[Math.floor(Math.random()*clickSounds.length)];
    snd.currentTime = 0; snd.play().catch(()=>{});
    bumpCounter();
    wrap.classList.remove('jumping');
    void wrap.offsetWidth;
    wrap.classList.add('jumping');
    wrap.addEventListener('animationend',()=>wrap.classList.remove('jumping'),{once:true});

    const pool = clickCount > 30 ? rageMode : phrases;
    pIdx = (pIdx+1) % pool.length;
    showBubble(pool[pIdx]);

    // Искры
    const rect = wrap.getBoundingClientRect();
    const sx = rect.left + rect.width/2;
    const sy = rect.top  + rect.height/2;
    const n  = clickCount > 50 ? 20 : 13;
    for(let i=0;i<n;i++){
      const sp = document.createElement('div');
      const angle = (i/n)*Math.PI*2 + Math.random()*.5;
      const dist  = 50+Math.random()*85;
      const size  = 3+Math.random()*6;
      sp.style.cssText=`position:fixed;width:${size}px;height:${size}px;border-radius:50%;`
        +`background:${['#d480ff','#b04dff','#ff99ff','#fff','#c8a0ff','#ff77ee'][i%6]};`
        +`left:${sx}px;top:${sy}px;pointer-events:none;z-index:3000;`
        +`box-shadow:0 0 5px currentColor;`
        +`--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;`
        +`animation:sparkOut .6s ease-out forwards;`;
      document.body.appendChild(sp);
      setTimeout(()=>sp.remove(), 620);
    }
  }

  wrap.addEventListener('click', handleClick);

  // Ховер показывает текущую фразу без смены индекса
  wrap.addEventListener('mouseenter',()=>{
    hoverActive = true;
    showBubble(phrases[pIdx]);
  });
  wrap.addEventListener('mouseleave',()=>{
    hoverActive = false;
    clearTimeout(bubbleHideTimer);
    bubbleHideTimer = setTimeout(()=>bubble.classList.remove('show'), 500);
  });

  window.addEventListener('resize', positionBubble);
})();

// ── MUSIC ──
const btn=document.getElementById('toggle-music'),icon=document.getElementById('sound-icon');
const ION ='<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
const IOFF='<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
const bgMusic=new Audio('ikea.mp3');bgMusic.loop=true;bgMusic.volume=0.55;
function setMUI(p){icon.innerHTML=p?ION:IOFF;btn.classList.toggle('music-pulse',p);}
bgMusic.play().then(()=>setMUI(true)).catch(()=>{
  setMUI(false);
  const t=()=>{bgMusic.play().then(()=>{setMUI(true);document.removeEventListener('mousemove',t);document.removeEventListener('click',t);}).catch(()=>{});};
  document.addEventListener('mousemove',t);document.addEventListener('click',t);
});
const vp=document.getElementById('volume-panel'),vs=document.getElementById('vol-slider'),
      vv=document.getElementById('vol-value'),vi=document.getElementById('vol-icon-high');
let vt=null;
btn.addEventListener('mouseenter',()=>{clearTimeout(vt);vp.classList.add('visible');});
btn.addEventListener('mouseleave',()=>{vt=setTimeout(()=>vp.classList.remove('visible'),300);});
vp.addEventListener('mouseenter',()=>{clearTimeout(vt);vp.classList.add('visible');});
vp.addEventListener('mouseleave',()=>{vt=setTimeout(()=>vp.classList.remove('visible'),300);});
btn.addEventListener('click',e=>{e.stopPropagation();if(bgMusic.paused)bgMusic.play().then(()=>setMUI(true)).catch(()=>{});else{bgMusic.pause();setMUI(false);}});
vs.addEventListener('input',()=>{const v=parseInt(vs.value);bgMusic.volume=v/100;vv.textContent=v+'%';vi.innerHTML=v>0?ION:IOFF;vi.style.opacity=v>0?'0.85':'0.45';});

// ── BURGER ──
const bb=document.getElementById('burger-btn'),nl=document.getElementById('nav-links');
bb.addEventListener('click',()=>{const o=nl.classList.toggle('open');bb.classList.toggle('open',o);bb.setAttribute('aria-expanded',o);});
nl.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{nl.classList.remove('open');bb.classList.remove('open');bb.setAttribute('aria-expanded','false');}));
</script>
