<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" href="icon.png" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кто ты из SF? — SquareFox</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Press+Start+2P&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07000f;
      --bg2: #0f0020;
      --accent: #b04dff;
      --accent2: #7a1fff;
      --accent3: #d480ff;
      --glow: rgba(160,60,255,0.38);
      --text: #e8d5ff;
      --muted: #9370bb;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { -webkit-tap-highlight-color: transparent; }
    img {
      outline: none;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-user-select: none;
    }
    img:focus { outline: none; }
    a, button, [role="button"] {
      -webkit-tap-highlight-color: transparent;
    }
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      font-family: 'Raleway', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #starfield { position: fixed; inset: 0; z-index: 0; }

    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(7,0,16,0.92);
      border-bottom: 1px solid rgba(176,77,255,0.15);
      backdrop-filter: blur(16px);
      display: flex; justify-content: center; align-items: center;
      gap: 4px; padding: 13px 16px; z-index: 1000; flex-wrap: wrap;
    }
    .logo-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 1em; color: var(--accent);
      letter-spacing: 3px; margin-right: 18px;
      text-shadow: 0 0 18px var(--glow), 0 2px 0 #3a0070;
      text-decoration: none;
    }
    header a {
      color: var(--muted); text-decoration: none;
      font-weight: 600; font-size: 0.78em;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 6px 12px; border-radius: 20px;
      transition: all 0.3s ease; border: 1px solid transparent;
    }
    header a:hover, header a.active {
      color: #fff; border-color: rgba(176,77,255,0.4);
      background: rgba(176,77,255,0.12);
    }
    header a.special {
      background: rgba(176,77,255,0.12);
      border-color: rgba(176,77,255,0.3); color: var(--accent3);
    }
    header a.special:hover { background: rgba(176,77,255,0.26); color: #fff; }
    header a.merch-link {
      background: rgba(212,128,255,0.15);
      border-color: rgba(212,128,255,0.4); color: #e8a0ff;
    }
    header a.merch-link:hover { background: rgba(212,128,255,0.28); color: #fff; }

    /* BURGER */
    .burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      margin-left: auto;
      z-index: 1001;
    }
    .burger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .burger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    @media (max-width: 768px) {
      header {
        justify-content: space-between;
        flex-wrap: nowrap;
        gap: 0;
        padding: 10px 16px;
      }
      .logo-text { font-size: 0.85em; margin-right: 0; }
      .burger { display: flex; }
      .nav-links {
        display: none;
        position: absolute;
        top: 100%; left: 0; right: 0;
        background: rgba(7, 0, 16, 0.97);
        border-bottom: 1px solid rgba(176, 77, 255, 0.2);
        flex-direction: column;
        align-items: stretch;
        gap: 2px;
        padding: 10px 12px 16px;
        backdrop-filter: blur(16px);
        z-index: 999;
      }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 10px 14px; font-size: 0.82em; border-radius: 10px; }
      .top-buttons { top: 68px; }
      .volume-panel { top: 68px; }
      .page-wrap { padding-top: 70px; }
    }

    /* PAGE */
    .page-wrap {
      position: relative; z-index: 1;
      padding-top: 80px; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px 36px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(176,77,255,0.1);
      border: 1px solid rgba(176,77,255,0.3);
      border-radius: 30px; padding: 6px 18px;
      font-size: 0.72em; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--accent3);
      animation: fadeDown 0.8s ease both;
    }
    .badge-dot {
      width: 7px; height: 7px; background: var(--accent);
      border-radius: 50%; animation: blink 1.8s ease infinite;
      box-shadow: 0 0 8px var(--accent);
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .hero-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.1em, 4.5vw, 2.2em);
      color: #fff; line-height: 1.4; letter-spacing: 3px;
      text-shadow: 0 0 30px var(--accent), 0 0 80px rgba(176,77,255,0.35), 0 4px 0 #2a0060;
      animation: fadeDown 0.9s 0.1s ease both; opacity: 0; animation-fill-mode: forwards;
    }
    .hero-sub {
      color: var(--muted); font-size: 0.86em;
      letter-spacing: 2px; text-transform: uppercase; font-weight: 300;
      animation: fadeDown 0.9s 0.25s ease both; opacity: 0; animation-fill-mode: forwards;
    }
    .hero-divider {
      width: 90px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: fadeDown 0.9s 0.35s ease both; opacity: 0; animation-fill-mode: forwards;
    }

    /* WHEEL AREA */
    .wheel-area {
      display: flex; flex-direction: column; align-items: center; gap: 26px;
      padding: 0 20px 20px;
      animation: fadeDown 0.9s 0.45s ease both; opacity: 0; animation-fill-mode: forwards;
    }

    /* OLEG */
    .wheel-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0px;
      width: 100%;
      position: relative;
    }
    #oleg-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      pointer-events: none;
      position: absolute;
      right: 50%;
      margin-right: -80px;
    }
    #oleg-img {
      width: 50%;
      height: auto;
      image-rendering: auto;
      filter: drop-shadow(0 0 18px rgba(136,136,0,0.75));
      display: block;
    }
    @media(max-width:600px){
      #oleg-wrap { display: none; }
    }
    .wheel-wrap {
      position: relative; display: flex;
      align-items: center; justify-content: center;
      z-index: 3;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(176,77,255,0.16);
      pointer-events: none; animation: rotateSlow linear infinite;
    }
    .ring-1 { width: 430px; height: 430px; animation-duration: 30s; }
    .ring-2 { width: 476px; height: 476px; animation-duration: 55s;
      animation-direction: reverse; border-style: dashed;
      border-color: rgba(176,77,255,0.09); }
    .wheel-pointer {
      position: absolute; top: -20px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 30px solid #ff4dff;
      filter: drop-shadow(0 0 12px rgba(255,77,255,0.9));
      z-index: 10;
    }
    canvas#wheel {
      display: block; border-radius: 50%;
      box-shadow:
        0 0 0 3px rgba(176,77,255,0.25),
        0 0 0 7px rgba(176,77,255,0.08),
        0 0 70px rgba(160,60,255,0.55),
        0 0 140px rgba(160,60,255,0.18);
    }
    .wheel-center {
      position: absolute; width: 58px; height: 58px;
      background: radial-gradient(circle, #3a00a0, #0f0020);
      border-radius: 50%;
      border: 3px solid rgba(212,128,255,0.6);
      box-shadow: 0 0 24px rgba(212,128,255,0.7), inset 0 0 16px rgba(176,77,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5em; z-index: 5; pointer-events: none;
    }

    /* BUTTON */
    .spin-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.72em; letter-spacing: 2px;
      padding: 15px 44px; border-radius: 50px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff; border: none; cursor: pointer;
      box-shadow: 0 4px 30px rgba(160,60,255,0.6);
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .spin-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
      opacity:0; transition:opacity 0.3s;
    }
    .spin-btn:hover:not(:disabled) { transform:translateY(-4px); box-shadow:0 10px 44px rgba(160,60,255,0.8); }
    .spin-btn:hover:not(:disabled)::after { opacity:1; }
    .spin-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
    .spin-hint {
      font-size:0.72em; color:rgba(147,112,187,0.5);
      letter-spacing:1.5px; text-transform:uppercase; text-align:center;
    }

    /* RESULT OVERLAY */
    .result-overlay {
      position: fixed; inset: 0;
      background: rgba(4,0,10,0.9);
      backdrop-filter: blur(16px);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .result-overlay.show { opacity:1; pointer-events:all; }

    .result-modal {
      position: relative;
      width: 100%; max-width: 600px;
      background: linear-gradient(148deg, #16002e 0%, #280055 50%, #0b001c 100%);
      border: 1px solid rgba(176,77,255,0.35);
      border-radius: 26px;
      padding: 44px 38px 38px;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      text-align: center;
      box-shadow: 0 0 80px rgba(160,60,255,0.28), 0 0 0 1px rgba(255,255,255,0.04);
      transform: scale(0.88) translateY(30px);
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
      max-height: 90vh; overflow-y: auto;
    }
    .result-overlay.show .result-modal { transform:scale(1) translateY(0); }
    .result-modal::before {
      content:''; position:absolute; top:0; left:0; right:0; height:170px;
      background:radial-gradient(ellipse at 50% 0%, rgba(176,77,255,0.2), transparent 70%);
      border-radius:26px 26px 0 0; pointer-events:none;
    }

    .close-btn {
      position:absolute; top:14px; right:16px;
      background:rgba(176,77,255,0.1);
      border:1px solid rgba(176,77,255,0.22);
      color:var(--muted); font-size:1em;
      width:34px; height:34px; border-radius:50%;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; z-index:1;
    }
    .close-btn:hover { background:rgba(176,77,255,0.28); color:#fff; }

    /* MUSIC BUTTON */
    .top-buttons{position:fixed;top:80px;right:13px;z-index:999;display:flex;flex-direction:column;gap:7px;}
    .top-button{background:rgba(10,0,20,.84);border:1px solid rgba(176,77,255,.2);border-radius:50%;width:42px;height:42px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s;display:flex;justify-content:center;align-items:center;}
    .top-button:hover{background:rgba(176,77,255,.28);border-color:var(--accent);transform:scale(1.12) translateX(-3px);box-shadow:0 0 10px var(--glow);}
    .top-button svg{width:19px;height:19px;fill:#d0b0ee;}
    @keyframes musicPulse{0%,100%{box-shadow:0 0 5px var(--glow);}50%{box-shadow:0 0 18px rgba(176,77,255,.7);}}
    .music-pulse{animation:musicPulse 2s ease infinite;}
    .volume-panel{position:fixed;top:80px;right:62px;z-index:998;display:flex;align-items:center;pointer-events:none;opacity:0;transform:translateX(10px);transition:opacity .25s,transform .25s;}
    .volume-panel.visible{pointer-events:all;opacity:1;transform:translateX(0);}
    .volume-panel-inner{background:rgba(10,0,20,.92);border:1px solid rgba(176,77,255,.22);border-radius:20px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;backdrop-filter:blur(10px);}
    .volume-label{font-size:.6em;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
    .volume-value{font-size:.65em;color:var(--bright);letter-spacing:1px;}
    input[type=range].vol-slider{-webkit-appearance:none;appearance:none;writing-mode:vertical-lr;direction:rtl;width:6px;height:90px;background:transparent;cursor:pointer;outline:none;}
    input[type=range].vol-slider::-webkit-slider-runnable-track{background:rgba(176,77,255,.2);border-radius:10px;width:6px;}
    input[type=range].vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));margin-left:-5px;box-shadow:0 0 6px rgba(176,77,255,.5);}
    input[type=range].vol-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;}

    .result-img-wrap {
      width:128px; height:128px; border-radius:50%;
      overflow:hidden;
      border:3px solid rgba(176,77,255,0.5);
      box-shadow:0 0 32px rgba(176,77,255,0.5),0 0 64px rgba(176,77,255,0.2);
      background:rgba(176,77,255,0.08); flex-shrink:0;
      animation:popIn 0.5s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .result-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .result-img-wrap .ph {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center; font-size:3em;
    }
    @keyframes popIn {
      from{transform:scale(0) rotate(-15deg);opacity:0;}
      to{transform:scale(1) rotate(0);opacity:1;}
    }

    .result-label {
      font-size:0.7em; letter-spacing:2px; text-transform:uppercase;
      color:var(--accent3); font-weight:600;
    }
    .result-name {
      font-family:'Press Start 2P', monospace;
      font-size:clamp(1em,3.5vw,1.5em);
      color:#fff; letter-spacing:2px;
      text-shadow:0 0 24px var(--glow);
    }
    .result-role {
      font-size:0.78em; color:var(--accent3);
      letter-spacing:1.5px; font-weight:600; text-transform:uppercase;
      padding:0 10px; line-height:1.5;
    }
    .result-divider {
      width:60px; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
    }
    .result-tags {
      display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
    }
    .tag {
      background:rgba(176,77,255,0.1);
      border:1px solid rgba(176,77,255,0.22);
      border-radius:20px; padding:4px 14px;
      font-size:0.72em; color:var(--muted); letter-spacing:1px;
    }
    .tag.hi {
      background:rgba(176,77,255,0.18);
      border-color:rgba(176,77,255,0.45); color:var(--accent3);
    }
    .result-lore {
      font-size:0.86em; line-height:1.85;
      color:#d0b0ee; font-weight:300;
      text-align:left; max-height:200px; overflow-y:auto;
      scrollbar-width:thin; scrollbar-color:rgba(176,77,255,0.3) transparent;
      padding:0 4px;
    }
    .result-lore::-webkit-scrollbar{width:4px;}
    .result-lore::-webkit-scrollbar-thumb{background:rgba(176,77,255,0.3);border-radius:4px;}

    .again-btn {
      font-family:'Raleway',sans-serif; font-weight:700;
      font-size:0.82em; letter-spacing:1.5px; text-transform:uppercase;
      padding:11px 30px; border-radius:50px;
      background:transparent; color:var(--accent);
      border:1px solid rgba(176,77,255,0.5);
      cursor:pointer; transition:all 0.3s; margin-top:4px;
    }
    .again-btn:hover { background:rgba(176,77,255,0.1); transform:translateY(-2px); }

    /* sparks */
    .spark {
      position:fixed; width:6px; height:6px;
      border-radius:50%; background:var(--accent3);
      pointer-events:none; z-index:3000;
      animation:sparkOut 0.9s ease-out forwards;
    }
    @keyframes sparkOut { to{transform:var(--st);opacity:0;scale:0;} }

    /* footer */
    footer {
      text-align:center; padding:30px 20px;
      color:rgba(147,112,187,0.35);
      font-size:0.72em; letter-spacing:2px; text-transform:uppercase;
      border-top:1px solid rgba(176,77,255,0.07);
      width:100%; position:relative; z-index:1; margin-top:auto;
    }

    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-20px);}
      to{opacity:1;transform:translateY(0);}
    }
    @keyframes rotateSlow {
      from{transform:rotate(0deg);} to{transform:rotate(360deg);}
    }
    .spinning canvas#wheel { animation:glowPulse 0.35s ease infinite; }
    @keyframes glowPulse {
      0%,100%{box-shadow:0 0 0 3px rgba(176,77,255,0.25),0 0 70px rgba(160,60,255,0.55);}
      50%{box-shadow:0 0 0 5px rgba(212,128,255,0.6),0 0 110px rgba(212,128,255,0.75);}
    }

    @media(max-width:520px){
      .ring-1{width:330px;height:330px;}
      .ring-2{width:374px;height:374px;}
      .result-modal{padding:36px 18px 28px;}
      .result-name{font-size:clamp(0.85em,4vw,1.2em);}
    }

    /* ─── MC ACHIEVEMENT ─── */
    .mc-achievement {
      position: fixed;
      top: 20px; right: -440px;
      z-index: 99999;
      pointer-events: none;
      transition: right 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    .mc-achievement.show { right: 20px; }
    .mc-achievement img { display: block; image-rendering: pixelated; max-width: calc(100vw - 24px); height: auto; }
    @media (max-width: 440px) {
      .mc-achievement { right: -340px; }
      .mc-achievement.show { right: 10px; }
      .mc-achievement img { width: 75vw !important; }
    }
  </style>
</head>
<body>
<div class="mc-achievement" id="mc-achievement">
  <img id="mc-achievement-img" src="" alt="">
</div>
<canvas id="starfield"></canvas>

<div class="volume-panel" id="volume-panel">
  <div class="volume-panel-inner">
    <span class="volume-label">Громкость</span>
    <svg id="vol-icon-high" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="#d0b0ee" style="opacity:0.85">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="45" orient="vertical">
    <span class="volume-value" id="vol-value">45%</span>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="#d0b0ee" style="opacity:0.35">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
  </div>
</div>

<div class="top-buttons">
  <button id="music-btn" class="top-button" title="Музыка">
    <svg id="sound-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>
</div>

<header>
  <a href="index.html" class="logo-text">SquareFox</a>
  <button class="burger" id="burger-btn" aria-label="Меню" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

function startMusic() {
  bgMusic.play().then(() => {

      document.removeEventListener('click', onFirstInteraction);
      document.removeEventListener('keydown', onFirstInteraction);
      autoplayListenerActive = false;
    }
  }).catch(() => {});
}

function onFirstInteraction(e) {
  if (e.target === musicBtn) return;

}

}).catch(() => {
  setMusicUI(false);
  autoplayListenerActive = true;

const N = characters.length;
const arc = (2*Math.PI)/N;
let angle = 0, spinning = false;
let spinCount = 0;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');

const bgs = [
  ['#180034','#2a0060'],['#0e001e','#1c003c'],['#1c0030','#300058'],
  ['#100020','#1e003e'],['#160028','#260050'],['#120022','#200044'],
  ['#1a002e','#2e005a'],['#0c001a','#180034'],['#180030','#2c0054'],
  ['#0f0020','#1c003a'],['#1c002c','#300050'],['#0d001e','#1a0038'],
  ['#1a0034','#2e005c'],['#10001e','#1e003c'],['#16002a','#260050'],
  ['#200030','#3a0050'],['#1a1500','#2e2800'],['#001a20','#002e38'],
  ['#1a1a00','#2a2800'],
];

function drawWheel(a) {
  const cx = canvas.width/2, cy = canvas.height/2, R = cx-5;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let i=0;i<N;i++) {
    const sa = a+i*arc, ea = sa+arc;
    const ch = characters[i];
    const g = ctx.createRadialGradient(cx,cy,14,cx,cy,R);
    g.addColorStop(0,bgs[i][0]); g.addColorStop(1,bgs[i][1]);
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,sa,ea); ctx.closePath();
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(176,77,255,0.26)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx,cy,R-8,sa+0.05,ea-0.05);
    ctx.strokeStyle=ch.glow+'77'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(sa+arc/2); ctx.textAlign='right';
    ctx.font=`${R*0.1}px serif`; ctx.fillText(ch.emoji,R-13,5);
    const fs = Math.min(R*0.068,12);
    ctx.font=`700 ${fs}px Raleway,sans-serif`;
    ctx.fillStyle='#fff'; ctx.shadowColor=ch.glow; ctx.shadowBlur=7;
    ctx.fillText(ch.name,R-34,5); ctx.shadowBlur=0;
    ctx.restore();
  }
  const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,30);
  cg.addColorStop(0,'#4800b0'); cg.addColorStop(1,'#0f0020');
  ctx.beginPath(); ctx.arc(cx,cy,30,0,2*Math.PI);
  ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='rgba(212,128,255,0.65)'; ctx.lineWidth=2.5; ctx.stroke();
}

drawWheel(angle);

function getWinner(a) {
  const n = (((-a-Math.PI/2)%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  return characters[Math.floor(n/arc)%N];
}
function easeOut(t) { return 1-Math.pow(1-t,4); }

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('wheel-wrap').classList.add('spinning');

  rouletteSnd.currentTime = 0;
  rouletteSnd.play().catch(() => {});

  animateOleg('forward', 400);
  const spins=(6+Math.random()*6)*2*Math.PI;
  const extra=Math.random()*2*Math.PI;
  const target=angle-spins-extra;
  const dur=4800+Math.random()*1600;
  const start=angle, t0=performance.now();
  function tick(now) {
    const t=Math.min((now-t0)/dur,1);
    const cur=start+(target-start)*easeOut(t);
    drawWheel(cur);
    if (t<1){requestAnimationFrame(tick);return;}
    angle=target; drawWheel(angle);
    spinning=false;
    document.getElementById('spin-btn').disabled=false;
    document.getElementById('spin-btn').innerHTML='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Крутить ещё раз';
    document.getElementById('wheel-wrap').classList.remove('spinning');

    rouletteSnd.pause();
    rouletteSnd.currentTime = 0;

    setTimeout(() => { olegImg.src = olegFrames[0]; }, 800);

    spinCount++;
    if (spinCount >= 9) {
      document.getElementById('spin-btn').dataset.psycho = '1';
    }

    showResult(getWinner(angle));
  }
  requestAnimationFrame(tick);
}

function showResult(ch) {
  const ov = document.getElementById('result-overlay');

  void ov.offsetWidth;

  document.getElementById('result-name').textContent = ch.name;
  document.getElementById('result-role').textContent = ch.role;
  document.getElementById('result-lore').textContent = ch.lore;

  const tags = document.getElementById('result-tags');
  tags.innerHTML = `<span class="tag hi">${ch.age}</span>`+
    ch.traits.map(t=>`<span class="tag">${t}</span>`).join('');

  const wrap = document.getElementById('result-img-wrap');
  wrap.innerHTML = `<div class="ph">${ch.emoji}</div>`;
  const img = new Image();
  img.src = ch.img;
  img.draggable = false;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;outline:none;user-select:none;';
  img.onload = () => {
    wrap.innerHTML = '';
    wrap.appendChild(img);
  };
  img.onerror = () => {
    // Если картинка не загрузилась — оставляем emoji-заглушку
  };
  wrap.style.boxShadow = `0 0 32px ${ch.glow}88,0 0 64px ${ch.glow}44`;

  ov.classList.add('show');
  document.body.style.overflow = 'hidden';
  if(ch.name==='Олег'&&!_olegDone){_olegDone=true;setTimeout(()=>showMcAchievement('Достижение2.png',320,64),600);}

  happySnd.currentTime = 0;
  happySnd.play().catch(() => {});

  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const ang = (i/18)*360;
    const d = 110+Math.random()*90;
    const x = Math.cos(ang*Math.PI/180)*d, y = Math.sin(ang*Math.PI/180)*d;
    s.style.cssText = `left:${cx}px;top:${cy}px;margin:-3px;--st:translate(${x}px,${y}px);animation-delay:${Math.random()*0.3}s;background:${ch.glow};`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1100);
  }
}

function onAgainClick() {
  if (document.getElementById('spin-btn').dataset.psycho === '1') {
    if(!_psychoDone){_psychoDone=true;showMcAchievement('Достижение3.png',350,64);}
    window.open('https://prodoctorov.ru/chelyabinsk/psiholog/', '_blank');
    delete document.getElementById('spin-btn').dataset.psycho;
  }
  closeResult();
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
  document.body.style.overflow='';
}
document.getElementById('result-overlay').addEventListener('click',e=>{

});

// STARFIELD
const sfC=document.getElementById('starfield');
const sfX=sfC.getContext('2d');
let stars=[],sw,sh;
function initStars(){
  sw=sfC.width=window.innerWidth; sh=sfC.height=window.innerHeight;
  stars=Array.from({length:250},()=>({
    x:Math.random()*sw,y:Math.random()*sh,
    r:Math.random()*1.3+0.28,
    dx:(Math.random()-0.5)*0.28,dy:(Math.random()-0.5)*0.28,
    op:Math.random()*0.5+0.4
  }));
}
function animStars(){
  sfX.clearRect(0,0,sw,sh);
  for(const s of stars){
    sfX.beginPath(); sfX.arc(s.x,s.y,s.r,0,Math.PI*2);
    sfX.fillStyle=`rgba(255,255,255,${s.op})`; sfX.fill();
    s.x+=s.dx; s.y+=s.dy;
    if(s.x<0||s.x>sw||s.y<0||s.y>sh){s.x=Math.random()*sw;s.y=Math.random()*sh;}
  }
  requestAnimationFrame(animStars);
}
function resizeWheel(){
  const size=Math.min(380,window.innerWidth-56);
  canvas.width=size; canvas.height=size; drawWheel(angle);
  const olegWrap = document.getElementById('oleg-wrap');
  if (olegWrap) olegWrap.style.width = Math.round(size * 2.4) + 'px';
}
window.addEventListener('resize',()=>{initStars();resizeWheel();});
initStars(); animStars(); resizeWheel();

// ─── ОЛЕГ ───
const olegImg    = document.getElementById('oleg-img');
const olegFrames = ['Олег1.png','Олег2.png','Олег3.png','Олег4.png','Олег5.png','Олег6.png'];
let olegAnimating = false;

olegFrames.forEach(src => { const i = new Image(); i.src = src; });

function olegLevitate(ts) {
  const y   = Math.sin(ts / 1500)       * 18
            + Math.sin(ts / 700 + 1.1)  * 6;
  const rot = Math.sin(ts / 2200)       * 2.5
            + Math.sin(ts / 950 + 0.8)  * 0.8;
  olegImg.style.transform = `translateY(${y}px) rotate(${rot}deg)`;
  requestAnimationFrame(olegLevitate);
}
requestAnimationFrame(olegLevitate);

function animateOleg(direction, totalDuration) {
  if (olegAnimating) return;
  olegAnimating = true;

  const step   = direction === 'forward' ? 1 : -1;
  const endIdx = direction === 'forward' ? olegFrames.length - 1 : 0;
  const steps  = olegFrames.length - 1;
  const delay  = totalDuration / steps;

  let frame = olegFrames.indexOf(olegImg.src.split('/').pop());
  if (frame === -1) frame = direction === 'forward' ? 0 : olegFrames.length - 1;

  function next() {
    frame += step;
    olegImg.src = olegFrames[frame];
    if (frame === endIdx) { olegAnimating = false; return; }
    setTimeout(next, delay);
  }
  setTimeout(next, delay);
}

// ─── BURGER MENU ───
const burgerBtn = document.getElementById('burger-btn');
const navLinks  = document.getElementById('nav-links');
burgerBtn.addEventListener('click', () => {

  burgerBtn.classList.toggle('open', isOpen);

navLinks.querySelectorAll('a').forEach(a => {

    navLinks.classList.remove('open');

    burgerBtn.setAttribute('aria-expanded', 'false');
  });
});

_achAudio.volume = 0.8;

function showMcAchievement(src, w, h) {
  const el = document.getElementById('mc-achievement');

  img.src = src; img.style.width = w+'px'; img.style.height = h+'px';

}
